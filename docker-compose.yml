services:
  postgres:
    image: postgres:16
    container_name: resumai_postgres
    environment:
      POSTGRES_DB: resumai
      POSTGRES_USER: resumai
      POSTGRES_PASSWORD: resumai_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resumai -d resumai"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - resumai_network

  api:
    build: .
    container_name: resumai_api
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      DATABASE_URL: postgresql+psycopg://resumai:resumai_password@postgres:5432/resumai
      JWT_SECRET: ${JWT_SECRET:-dev_change_this_secret}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: 50
      MAX_LLM_CHARS: 30000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      PYTEST_ADDOPTS: "-p no:cacheprovider"
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - resumai_network

volumes:
  postgres_data:

networks:
  resumai_network:
    driver: bridge
